name: Weekly Wino Mail Unlocked Build

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: FranzFerdiand/Wino-Mail-unlocked
  SOLUTION: WinoMail.slnx
  CERT_SUBJECT: 'CN=SzyangSoftware'
  DOTNET_URL: 'https://dotnet.microsoft.com/download/dotnet/9.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone upstream (depth=1)
        run: git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git src

      - name: Write .pfx from Base64 secret (absolute path)
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.SIGN_PFX_B64 }}")
          $pfxPath = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\SigningCert.pfx"
          New-Item -ItemType Directory -Force -Path (Split-Path $pfxPath) | Out-Null
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          Write-Host "PFX written: $pfxPath  Exists=$(Test-Path $pfxPath)"

      - name: Patch AppxManifest Publisher to match cert Subject
        shell: pwsh
        run: |
          $manifest = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\Package.appxmanifest"
          $escapedSubject = '${{ env.CERT_SUBJECT }}'
          (Get-Content $manifest -Raw) -replace 'Publisher="[^"]*"', "Publisher=`"$escapedSubject`"" |
            Set-Content $manifest -NoNewline
          Write-Host "Patched Publisher → $escapedSubject"

      - name: Patch wapproj - enable signing & disable temp cert
        shell: pwsh
        run: |
          $wproj = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\WinoMail.Packaging.wapproj"
          if (-not (Test-Path $wproj)) { Write-Error "wapproj NOT FOUND!"; exit 1 }

          $content = Get-Content $wproj -Raw
          $content = $content -replace `
            '<AppxPackageSigningEnabled>False</AppxPackageSigningEnabled>', `
            '<AppxPackageSigningEnabled>True</AppxPackageSigningEnabled>'
          $content = $content -replace `
            '<GenerateTemporaryStoreCertificate>True</GenerateTemporaryStoreCertificate>', `
            '<GenerateTemporaryStoreCertificate>False</GenerateTemporaryStoreCertificate>'

          Set-Content $wproj -NoNewline -Value $content
          Write-Host "Patched wapproj: signing enabled, temp cert disabled"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # ★ 定位 signtool.exe 并加入 PATH，找不到此 step 会 fail-fast
      - name: Add SignTool to PATH
        uses: KamaranL/add-signtool-action@v1

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj', 'src/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: msbuild src/${{ env.SOLUTION }} /t:Restore

      - name: Build & Package MSIX (signed with pfx)
        shell: pwsh
        run: |
          $pfxAbs = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\SigningCert.pfx"
          msbuild "src\${{ env.SOLUTION }}" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x64|x86" `
            /p:PackageCertificateKeyFile="$pfxAbs" `
            /p:PackageCertificatePassword="${{ secrets.SIGN_PFX_PWD }}" `
            /p:AppxPackageSigningEnabled=true `
            /p:EnableSigningChecks=false `
            /p:IsPackable=false `
            /p:AppxAutoRemoveDisposableSigningCertificate=false

      # ★ 前半段检查 signtool 是否在 PATH，找不到则 skip（exit 0 + output=skipped）
      - name: Check signature and optionally re-sign
        id: check_sign
        shell: pwsh
        run: |
          $pfxAbs = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\SigningCert.pfx"
          $pwd   = "${{ secrets.SIGN_PFX_PWD }}"

          # —— 前半段：确认 signtool 在 PATH 中 ——
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            Write-Warning "⚠️ signtool.exe NOT found in PATH — skipping sign check/resign"
            "sign_status=skipped_no_signtool" >> $env:GITHUB_OUTPUT
            exit 0
          }
          Write-Host "✔ Using signtool: $signtool"

          # —— 找到 bundle ——
          $bundle = Get-ChildItem "src" -Filter "*.msixbundle" -Recurse -File -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $bundle) { Write-Error "MSIXBUNDLE not found!"; exit 1 }

          $bundlePath = $bundle.FullName
          Write-Host "Checking signature on: $bundlePath"

          # —— 验签 ——
          & "$signtool" verify /pa "$bundlePath" 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ Already signed"
            "sign_status=signed" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Not signed, signing now…"
            & "$signtool" sign /fd SHA256 /f "$pfxAbs" /p "$pwd" `
              /tr http://timestamp.digicert.com /td SHA256 "$bundlePath" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Signed successfully"
              "sign_status=signed" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "⚠️ Signing failed"
              "sign_status=sign_failed" >> $env:GITHUB_OUTPUT
            }
          }
          "bundle_path=$bundlePath" >> $env:GITHUB_OUTPUT

      - name: Export certificate as .cer for release
        shell: pwsh
        run: |
          $pfxPath = "$env:GITHUB_WORKSPACE\src\WinoMail.Packaging\SigningCert.pfx"
          $secPwd = ConvertTo-SecureString -String "${{ secrets.SIGN_PFX_PWD }}" -AsPlainText -Force
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($pfxPath, $secPwd)
          $cerPath = "$env:GITHUB_WORKSPACE\crt.cer"
          [System.IO.File]::WriteAllBytes($cerPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          Write-Host "Exported .cer: $cerPath"

      - name: Create GitHub Release (gh CLI)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $now = Get-Date
          $year  = $now.Year
          $weekNum = [Globalization.CultureInfo]::InvariantCulture.Calendar.GetWeekOfYear(
            $now,
            [Globalization.CalendarWeekRule]::FirstDay,
            [DayOfWeek]::Monday
          )
          $runNumber = $env:GITHUB_RUN_NUMBER
          $tag       = "v$year.$weekNum.r$runNumber"
          $releaseTitle = "v$year.$weekNum (run #$runNumber)"
          $ts = $now.ToString("yyyy-MM-dd HH:mm:ss UTC")

          $signStatus = "${{ steps.check_sign.outputs.sign_status }}"
          $bundlePath = "${{ steps.check_sign.outputs.bundle_path }}"

          $notes = @(
            "Built: $ts",
            "",
            "如果安装时提示需要 .NET 运行时，请下载安装：",
            "${{ env.DOTNET_URL }}",
            ""
          )

          if ($signStatus -eq "signed") {
            $notes += "已签名"
          } elseif ($signStatus -eq "skipped_no_signtool") {
            $notes += "签名检查跳过（signtool 未找到），包可能未签名"
          } else {
            $notes += "签名失败或未签名"
          }

          gh release delete $tag --yes --discard-history 2>$null
          gh release create $tag `
            --title "$releaseTitle" `
            --notes ($notes -join "`n") `
            "$bundlePath" `
            "$env:GITHUB_WORKSPACE\crt.cer"
